<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@800;900&amp;family=Montserrat:wght@600&amp;family=JetBrains+Mono:wght@500&amp;display=block');
    </style>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#050a10"/>
    </linearGradient>
    <linearGradient id="line-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2bb8ff" stop-opacity="0"/>
      <stop offset="15%" stop-color="#2bb8ff" stop-opacity="0.8"/>
      <stop offset="85%" stop-color="#2bb8ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#2bb8ff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-strong" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg-grad)"/>

  <!-- subtle grid lines -->
  <g opacity="0.03" stroke="#2bb8ff" stroke-width="1">
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
  </g>

  <!-- giant vertical "zoop" watermark on the right (echoes the site's .side wordmark) -->
  <text x="1160" y="315" text-anchor="middle"
        font-family="'Unbounded', 'Arial Black', sans-serif" font-weight="900"
        font-size="420" fill="#2bb8ff" opacity="0.06"
        transform="rotate(90, 1160, 315)" letter-spacing="-0.05em">zoop</text>

  <!-- top neon line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#line-grad)"/>
  <!-- bottom neon line -->
  <rect x="0" y="627" width="1200" height="3" fill="url(#line-grad)"/>

  <!-- "zoop" main wordmark -->
  <text x="80" y="280" font-family="'Unbounded', 'Arial Black', sans-serif"
        font-weight="900" font-size="180" fill="#2bb8ff" filter="url(#glow)"
        letter-spacing="-0.03em">zoop</text>

  <!-- tagline -->
  <text x="84" y="350" font-family="'Montserrat', 'Helvetica', sans-serif"
        font-weight="600" font-size="32" fill="#eaf3ff" opacity="0.85"
        letter-spacing="0.01em">cool things for the web</text>

  <!-- subtitle -->
  <text x="84" y="400" font-family="'JetBrains Mono', 'Courier New', monospace"
        font-weight="500" font-size="22" fill="#6f8598" letter-spacing="0.06em">
    Cloudflare glazer · WebGL enjoyer
  </text>

  <!-- separator dot -->
  <circle cx="100" cy="470" r="4" fill="#2bb8ff" filter="url(#glow-strong)"/>

  <!-- URL -->
  <text x="120" y="478" font-family="'JetBrains Mono', 'Courier New', monospace"
        font-weight="500" font-size="20" fill="#6f8598" letter-spacing="0.04em">
    zachy.cc
  </text>

  <!-- decorative neon corner accents -->
  <g stroke="#2bb8ff" stroke-width="2" fill="none" opacity="0.4" filter="url(#glow)">
    <path d="M 0 60 L 60 60 L 60 0"/>
    <path d="M 1200 570 L 1140 570 L 1140 630"/>
  </g>
</svg>
